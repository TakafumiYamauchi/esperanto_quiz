# Copy this file to .streamlit/secrets.toml (do NOT commit real secrets)
[connections.gsheets]
type = "service_account"
project_id = "your-project-id"
# Replace literal \n with newlines when pasting in Streamlit Cloud UI
private_key = "-----BEGIN PRIVATE KEY-----\\n...\\n-----END PRIVATE KEY-----\\n"
client_email = "service-account@project.iam.gserviceaccount.com"
spreadsheet = "https://docs.google.com/spreadsheets/d/your-sheet-id"

# Optional: enable audio in the mobile HTML/JS app by hosting audio files outside GitHub/Streamlit.
# Files are expected at <base_url>/<audioKey>.wav
[mobile_audio]
vocab_base_url = ""
sentence_base_url = ""
